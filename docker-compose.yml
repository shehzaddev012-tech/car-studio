# ── Car Studio — full stack
# Services: Redis, FastAPI backend, Celery worker, React frontend (dev)
#
# Quick start:
#   docker compose up --build
#
# Production note: replace the frontend service with a static build
# served via nginx, and set CORS origins to your production domain.

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no  # in-memory only; no disk persistence
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API (FastAPI + Uvicorn) ──────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////data/car_studio.db
      - STORAGE_BACKEND=local
      - STORAGE_PATH=/data/storage
      - DEBUG=${DEBUG:-false}
      - AI_PROVIDER=${AI_PROVIDER:-compositing}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - VERTEX_MIN_CONFIDENCE=${VERTEX_MIN_CONFIDENCE:-0.35}
      - VERTEX_REQUEST_TIMEOUT_SECONDS=${VERTEX_REQUEST_TIMEOUT_SECONDS:-60}
      - LPIPS_ENABLED=${LPIPS_ENABLED:-false}
      - QC_SSIM_THRESHOLD=${QC_SSIM_THRESHOLD:-0.75}
      - QC_LPIPS_THRESHOLD=${QC_LPIPS_THRESHOLD:-0.15}
      - JOB_TIMEOUT_SECONDS=${JOB_TIMEOUT_SECONDS:-600}
      - 'CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]'
    volumes:
      - ./backend/app:/app/app   # live-mount source — no rebuild needed for Python changes
      - ./backend/wow-car-496713-8ffc25ef4315.json:/secrets/gcp-key.json:ro
      - app_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery Worker ─────────────────────────────────────────────────────────────

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////data/car_studio.db
      - STORAGE_BACKEND=local
      - STORAGE_PATH=/data/storage
      - AI_PROVIDER=${AI_PROVIDER:-compositing}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - VERTEX_MIN_CONFIDENCE=${VERTEX_MIN_CONFIDENCE:-0.35}
      - VERTEX_REQUEST_TIMEOUT_SECONDS=${VERTEX_REQUEST_TIMEOUT_SECONDS:-60}
      - LPIPS_ENABLED=${LPIPS_ENABLED:-false}
      - QC_SSIM_THRESHOLD=${QC_SSIM_THRESHOLD:-0.75}
      - QC_LPIPS_THRESHOLD=${QC_LPIPS_THRESHOLD:-0.15}
      - JOB_TIMEOUT_SECONDS=${JOB_TIMEOUT_SECONDS:-600}
    volumes:
      - ./backend/app:/app/app   # live-mount source
      - ./backend/wow-car-496713-8ffc25ef4315.json:/secrets/gcp-key.json:ro
      - app_data:/data
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Frontend (Vite dev server) ────────────────────────────────────────────────
  # For production: run `npm run build` and serve ./dist with nginx

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      # Used by vite.config.ts (Node process) as the proxy target.
      # Must use the Docker service name — 'localhost' inside this container is not the API.
      - VITE_API_INTERNAL_BASE=http://api:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - api

volumes:
  app_data:
